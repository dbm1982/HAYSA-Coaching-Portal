name: Sync Drills

on:
  push:
    paths:
      - "data/approved.json"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml python-slugify

      - name: Convert JSON to YAML
        run: |
          python scripts/json_to_yaml.py

      - name: Commit YAML files
        run: |
          git config user.name "HAYSA Bot"
          git config user.email "bot@haysa.org"
          git add .
          git commit -m "Sync drills" || echo "No changes to commit"
          git push
